# .github/workflows/ci.yml
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      docker_build:
        description: "Build docker image"
        type: boolean
        default: false


permissions:
  contents: write

jobs:
  # Build static binaries (indexer, ultar_httpd)
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      matrix:
        target:
          # Linux uses musl for fully static binaries
          - { name: x86_64-linux, triplet: x86_64-linux-musl, runner: ubuntu-22.04, cpu: x86_64_v3 }
          - { name: aarch64-linux, triplet: aarch64-linux-musl, runner: ubuntu-24.04-arm, cpu: neoverse_v2 }
          - { name: aarch64-macos, triplet: aarch64-macos, runner: macos-latest, cpu: apple_m1 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build (ReleaseSafe, ${{ matrix.target.triplet }})
        run: |
          # Build CLI tools only (no Lua/dataloader needed)
          zig build cli \
            -Doptimize=ReleaseSafe \
            -Dtarget=${{ matrix.target.triplet }} \
            -Dcpu=${{ matrix.target.cpu }} \
            --summary all

      - name: Test
        run: |
          zig build test --summary all

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target.name }}
          path: zig-out/bin/

  # Build Python wheels (ABI3 stable ABI, Python 3.11+)
  python-wheels:
    name: Python wheel ${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.runner }}
    container: ${{ matrix.target.container }}
    strategy:
      matrix:
        target:
          - { platform: manylinux_2_28_x86_64, runner: ubuntu-22.04, container: "quay.io/pypa/manylinux_2_28_x86_64", cpu: x86_64_v3 }
          - { platform: manylinux_2_34_aarch64, runner: ubuntu-24.04-arm, container: "quay.io/pypa/manylinux_2_34_aarch64", cpu: neoverse_v2 }
          - { platform: macosx_11_0_arm64, runner: macos-latest, container: "", cpu: apple_m1 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            VERSION=$(git describe --exact-match --tags HEAD | sed 's/^v//')
          else
            VERSION="${{ vars.BASE_VERSION || '0.1.0' }}+g$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ULTAR_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Determined version: $VERSION"

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Setup Python (macOS)
        if: matrix.target.container == ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build dependencies (manylinux)
        if: matrix.target.container != ''
        run: |
          # Use Python 3.11 from manylinux's /opt/python
          export PATH="/opt/python/cp311-cp311/bin:$PATH"
          python3 -m pip install --upgrade pip
          python3 -m pip install build wheel setuptools
          # Verify Python is working
          python3 --version
          which python3

      - name: Install Python build dependencies (macOS)
        if: matrix.target.container == ''
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel setuptools

      - name: Build native extension (manylinux)
        if: matrix.target.container != ''
        run: |
          export PATH="/opt/python/cp311-cp311/bin:$PATH"
          zig build python-bindings \
            -Doptimize=ReleaseSafe \
            -Dcpu=${{ matrix.target.cpu }} \
            --summary all
        env:
          PYTHON: /opt/python/cp311-cp311/bin/python3

      - name: Build native extension (macOS)
        if: matrix.target.container == ''
        run: |
          zig build python-bindings \
            -Doptimize=ReleaseSafe \
            -Dcpu=${{ matrix.target.cpu }} \
            -Dlua=lua54 \
            --summary all
        env:
          PYTHON: python

      - name: Build wheel (manylinux)
        if: matrix.target.container != ''
        run: |
          export PATH="/opt/python/cp311-cp311/bin:$PATH"
          python3 -m build --wheel --no-isolation python/

      - name: Build wheel (macOS)
        if: matrix.target.container == ''
        run: |
          python -m build --wheel --no-isolation python/

      - name: Rename wheel to target platform
        run: |
          cd python/dist
          for whl in *.whl; do
            # Replace the platform tag with the target platform
            newname=$(echo "$whl" | sed -E "s/-(cp[0-9]+|py3)-abi3-[^.]+\.whl/-cp311-abi3-${{ matrix.target.platform }}.whl/")
            if [ "$whl" != "$newname" ]; then
              mv "$whl" "$newname"
            fi
          done
          ls -la

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target.platform }}
          path: python/dist/*.whl

  # Build and push multi-arch Docker image to GHCR (release or manual with docker_build)
  docker:
    name: Docker image
    needs: [build]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.docker_build == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: cli-x86_64-linux
          path: bin/amd64/

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: cli-aarch64-linux
          path: bin/arm64/

      - name: Make binaries executable
        run: chmod +x bin/*/ultar_httpd

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: meshyorg
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            meshyai/ultar
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set tags for manual runs
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.ref_name }}"
            REF_SANITIZED=$(echo "$REF" | tr '/' '-')
            SHA=$(git rev-parse --short HEAD)
            {
              echo "all_tags<<EOF"
              echo "${{ steps.meta.outputs.tags }}"
              echo "manual-${REF_SANITIZED}-${SHA}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            {
              echo "all_tags<<EOF"
              echo "${{ steps.meta.outputs.tags }}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.all_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Upload all artifacts to GitHub Release
  release:
    name: Upload Release Artifacts
    if: github.event_name == 'release'
    needs: [build, python-wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: cli-*

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: wheel-*

      - name: Package CLI binaries
        run: |
          mkdir -p release
          # Package each CLI target into a tar.gz
          for dir in artifacts/cli-*; do
            target=$(basename "$dir" | sed 's/cli-//')
            tar -czvf "release/ultar-cli-${target}.tar.gz" -C "$dir" .
          done
          # Copy wheels directly
          cp artifacts/wheel-*/*.whl release/
          ls -la release/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ github.ref_name }}" release/*
