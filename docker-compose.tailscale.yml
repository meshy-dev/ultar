# Tailscale sidecar — exposes ultar on your tailnet with automatic TLS.
# Usage:
#   TS_AUTHKEY=tskey-auth-... docker compose -f docker-compose.tailscale.yml up -d
#
# Generate a pre-auth key at: https://login.tailscale.com/admin/settings/keys
# To expose to the public internet via Funnel, add to tailscale-serve.json:
#   "AllowFunnel": { "${TS_CERT_DOMAIN}:443": true }

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ultar
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=ultar
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve-config.json
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve-config.json:ro
    cap_add:
      - net_admin
      - sys_module
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped

  ultar:
    image: ghcr.io/meshy-dev/ultar:latest
    # build: .   # uncomment to build from local Dockerfile instead
    network_mode: service:tailscale
    volumes:
      - ./data:/data
    # Allow io_uring in the container; otherwise xev loop init fails with EPERM.
    security_opt:
      - seccomp:unconfined
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  tailscale_state:
