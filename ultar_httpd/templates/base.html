<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WebDataset Index Browser</title>
  <meta name="color-scheme" content="dark"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-alpha6/dist/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
  <script src="/static/hljs-json.js" type="module"></script>
  <!-- Remove initial .active once page finishes loading -->
  <script>window.addEventListener('load', function() { document.getElementById('progress-bar').classList.remove('active'); });</script>
</head>

<body>
  <div id="progress-bar" class="active"></div>
  <div id="windows"></div>
  <!-- Hidden templates for floating windows -->
  <template id="tpl-thumb">
    <a class="image-preview"><img/></a>
  </template>
  <template id="tpl-float-image">
    <div class="float-window float-image">
      <div class="float-titlebar">
        <span class="float-title mono"></span>
        <a class="float-dl" download title="Download">&#8595;</a>
        <button class="float-close" onclick="this.closest('.float-window').remove()">&times;</button>
      </div>
      <div class="float-body">
        <a class="image-preview" target="_blank"><img/></a>
      </div>
    </div>
  </template>
  <template id="tpl-float-json">
    <div class="float-window" style="width:36rem">
      <div class="float-titlebar">
        <span class="float-title mono"></span>
        <a class="float-dl" download title="Download">&#8595;</a>
        <button class="float-close" onclick="this.closest('.float-window').remove()">&times;</button>
      </div>
      <div class="float-body">
        <div class="json-preview"><pre class="json-code"></pre></div>
      </div>
    </div>
  </template>
  <template id="tpl-float-video">
    <div class="float-window">
      <div class="float-titlebar">
        <span class="float-title mono"></span>
        <a class="float-dl" download title="Download">&#8595;</a>
        <button class="float-close" onclick="this.closest('.float-window').remove()">&times;</button>
      </div>
      <div class="float-body"><video controls></video></div>
    </div>
  </template>
  <template id="tpl-float-audio">
    <div class="float-window">
      <div class="float-titlebar">
        <span class="float-title mono"></span>
        <a class="float-dl" download title="Download">&#8595;</a>
        <button class="float-close" onclick="this.closest('.float-window').remove()">&times;</button>
      </div>
      <div class="float-body"><audio controls></audio></div>
    </div>
  </template>
  <template id="tpl-float-text">
    <div class="float-window" style="width:48rem">
      <div class="float-titlebar">
        <span class="float-title mono"></span>
        <a class="float-dl" download title="Download">&#8595;</a>
        <button class="float-close" onclick="this.closest('.float-window').remove()">&times;</button>
      </div>
      <div class="float-body"><iframe sandbox></iframe></div>
    </div>
  </template>
  <template id="tpl-float-other">
    <div class="float-window">
      <div class="float-titlebar">
        <span class="float-title mono"></span>
        <a class="float-dl" download title="Download">&#8595;</a>
        <button class="float-close" onclick="this.closest('.float-window').remove()">&times;</button>
      </div>
      <div class="float-body"><div class="dl-only">No preview available — use the download button above.</div></div>
    </div>
  </template>

  <div class="app">
    <aside id="file-tree" class="pane">
      <div class="status-bar"><span class="title">Ultar Index Viewer</span></div>
      <div class="pane-body">
        <div id="file-tree-list">
          {{{body}}}
        </div>
      </div>
      <div id="indexing-panel"></div>
    </aside>

    <main id="table-container" class="pane">
      {{{table_body}}}
    </main>
  </div>
</body>
</html>
