<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WebDataset Index Browser</title>
  <meta name="color-scheme" content="dark"/>
  <style>
    :root {
      color-scheme: dark;
      /* Catppuccin Mocha */
      --ctp-rosewater: #f5e0dc;
      --ctp-flamingo: #f2cdcd;
      --ctp-pink: #f5c2e7;
      --ctp-mauve: #cba6f7;
      --ctp-red: #f38ba8;
      --ctp-maroon: #eba0ac;
      --ctp-peach: #fab387;
      --ctp-yellow: #f9e2af;
      --ctp-green: #a6e3a1;
      --ctp-teal: #94e2d5;
      --ctp-sky: #89dceb;
      --ctp-sapphire: #74c7ec;
      --ctp-blue: #89b4fa;
      --ctp-lavender: #b4befe;
      --ctp-text: #cdd6f4;
      --ctp-subtext1: #bac2de;
      --ctp-subtext0: #a6adc8;
      --ctp-overlay2: #9399b2;
      --ctp-overlay1: #7f849c;
      --ctp-overlay0: #6c7086;
      --ctp-surface2: #585b70;
      --ctp-surface1: #45475a;
      --ctp-surface0: #313244;
      --ctp-base: #1e1e2e;
      --ctp-mantle: #181825;
      --ctp-crust: #11111b;
      /* Site tokens mapped to Mocha (+extra dark) */
      --bg: var(--ctp-crust);
      --panel: var(--ctp-mantle);
      --text: var(--ctp-text);
      --muted: var(--ctp-subtext0);
      --border: var(--ctp-overlay0);
      --accent: var(--ctp-blue);
      --accent-2: var(--ctp-sapphire);
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--ctp-sky); text-decoration: underline; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .title { font-weight: 700; }
    .app { display: flex; gap: 12px; padding: 12px; box-sizing: border-box; height: 100vh; }
    .pane { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; padding: 0; overflow: hidden; }
    .status-bar { background: var(--ctp-mantle); order: 1; }
    .pane-body { order: 0; }
    #file-tree.pane { flex: 0 0 20rem; max-width: 20rem; }
    #table-container.pane { flex: 1 1 auto; }
    #file-tree-list.htmx-request, #table-container.htmx-request { opacity: 0.6; transition: opacity 200ms linear; }
    .nav-list { list-style: none; margin: 0; padding: 0; }
    .nav-item a { display: block; padding: 6px 8px; color: var(--text); }
    .nav-item a:hover { background: var(--ctp-surface0); color: var(--accent); }
    .pane-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: auto; padding: 12px 0 12px 12px; scrollbar-gutter: stable; }
    #table-container .pane-body { padding: 0; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 8px 12px; border-top: 1px solid var(--border); color: var(--muted); }
    .table-wrap { overflow: visible; min-width: 100%; }
    /* Visible scrollbars (Firefox + WebKit) */
    .pane-body { scrollbar-width: auto; scrollbar-color: var(--ctp-overlay1) var(--ctp-surface1); }
    .pane-body::-webkit-scrollbar { width: 12px; height: 10px; }
    .pane-body::-webkit-scrollbar-track { background: var(--ctp-surface1); }
    .pane-body::-webkit-scrollbar-thumb { background: var(--ctp-overlay1); border: 2px solid var(--ctp-surface1); border-radius: 4px; }
    .pane-body::-webkit-scrollbar-thumb:hover { background: var(--ctp-overlay2); }
    .table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; table-layout: auto; background: var(--panel); color: var(--text); border-radius: 4px; }
    .table thead { position: sticky; top: 0; z-index: 10; }
    .table thead th { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); color: var(--ctp-subtext1); background: rgba(49, 50, 68, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .table tbody td { padding: 6px 8px; vertical-align: top; }
    .table tbody td:not(.sticky-left) { position: relative; }
    .table tr:hover td { background: var(--ctp-surface0); }
    .table tbody td:hover::after { content: ''; position: absolute; left: 0; right: 0; top: -5000px; height: 10000px; background: var(--ctp-surface0); opacity: 0.4; pointer-events: none; z-index: -1; }
    .table tbody td a { color: var(--ctp-overlay2); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; cursor: pointer; }
    .table tbody td a:hover { color: var(--accent-2); }
    :root { --left-col-width: 16ch; }
    .table { position: relative; }
    .sticky-left { position: sticky; left: 0; z-index: 3; min-width: var(--left-col-width); max-width: var(--left-col-width); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-right: 1px solid var(--border); }
    thead th.sticky-left { background: rgba(49, 50, 68, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 11; }
    tbody td.sticky-left { background: var(--panel); }
    .image-preview img { max-width: 20rem; max-height: 20rem; }
    div .json-preview { display: block; overflow: auto; max-width: 30rem; max-height: 20rem; padding: 8px; border: 1px solid var(--border); background: var(--ctp-crust); border-radius: 4px; }
    .json-preview pre { margin: 0; }
    /* Pagination */
    .pagination { display: flex; gap: 2px; align-items: center; }
    .pagination .pg { padding: 2px 8px; border-radius: 3px; color: var(--accent); cursor: pointer; font-size: 13px; }
    .pagination .pg:hover { background: var(--ctp-surface0); text-decoration: none; }
    .pagination .pg.current { color: var(--text); font-weight: 600; pointer-events: none; background: var(--ctp-surface1); }
    /* Top progress bar — driven by htmx's .htmx-request class via :has() */
    #progress-bar { position: fixed; top: 0; left: 0; width: 100%; height: 2px; z-index: 9999; pointer-events: none; overflow: hidden; opacity: 0; transition: opacity 0.4s ease; }
    #progress-bar.active, :root:has(.htmx-request) #progress-bar { opacity: 1; }
    #progress-bar::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0.15; animation: pb-pulse 2s ease-in-out infinite; }
    #progress-bar::after { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 40%; background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent); animation: pb-slide 1.2s ease-in-out infinite; }
    @keyframes pb-slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    @keyframes pb-pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.4; } }
  </style>
  <!-- Remove initial .active once page finishes loading -->
  <script>window.addEventListener('load', function() { document.getElementById('progress-bar').classList.remove('active'); });</script>
</head>

<body>
  <div id="progress-bar" class="active"></div>
  <div class="app">
    <aside id="file-tree" class="pane">
      <div class="status-bar"><span class="title">Ultar Index Viewer</span></div>
      <div class="pane-body">
        <div id="file-tree-list">
          {{{body}}}
        </div>
      </div>
    </aside>

    <main id="table-container" class="pane">
      {{{table_body}}}
    </main>
  </div>
  <!-- htmx: defer = non-blocking download, executes after DOM parse -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-alpha6/dist/htmx.min.js" defer></script>
  <!-- Delegated click handler: computes /boxed_file params from table DOM (data-file, data-k, data-id) -->
  <script>
    document.body.addEventListener('click', function(e) {
      var a = e.target.closest('table.table td a');
      if (!a) return;
      e.preventDefault();
      var td = a.closest('td');
      var tr = td.parentElement;
      var tbl = td.closest('table');
      var th = tbl.querySelector('thead tr').children[td.cellIndex];
      var url = '/boxed_file?file=' + tbl.dataset.file
        + '&id=' + encodeURIComponent(tr.dataset.id)
        + '&k=' + th.dataset.k
        + '&range_str=' + encodeURIComponent(a.textContent.trim());
      a.classList.add('htmx-request');
      htmx.ajax('GET', url, {target: a, swap: 'outerHTML'});
    });
  </script>
  <!-- highlight.js: ESM dynamic import(), loads core + JSON language on first use -->
  <script type="module">
    let hljsPromise = null;
    function loadHljs() {
      if (hljsPromise) return hljsPromise;
      hljsPromise = (async () => {
        try {
          const [{ default: hljs }, { default: json }] = await Promise.all([
            import('https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/es/core.min.js'),
            import('https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/es/languages/json.min.js')
          ]);
          hljs.registerLanguage('json', json);
          const css = document.createElement('style');
          css.textContent =
            '.hljs{color:var(--ctp-text);background:var(--ctp-crust);font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace}' +
            '.hljs-keyword,.hljs-literal{color:var(--ctp-mauve);font-weight:600}' +
            '.hljs-string{color:var(--ctp-green)}' +
            '.hljs-number{color:var(--ctp-peach)}' +
            '.hljs-attr,.hljs-attribute,.hljs-property,.hljs-attr-name{color:var(--ctp-blue)}' +
            '.hljs-punctuation{color:var(--ctp-overlay2)}' +
            '.hljs-comment,.hljs-quote{color:var(--ctp-overlay1);font-style:italic}' +
            '.hljs-title,.hljs-section,.hljs-name{color:var(--ctp-sapphire)}' +
            '.hljs-built_in,.hljs-type,.hljs-class{color:var(--ctp-yellow)}' +
            '.hljs-variable,.hljs-template-variable{color:var(--ctp-red)}' +
            '.hljs-symbol,.hljs-bullet{color:var(--ctp-teal)}' +
            '.hljs-addition{color:var(--ctp-green);background:rgba(166,227,161,.10)}' +
            '.hljs-deletion{color:var(--ctp-red);background:rgba(243,139,168,.10)}' +
            '.hljs-strong{font-weight:700}' +
            '.hljs-emphasis{font-style:italic}';
          document.head.appendChild(css);
          return hljs;
        } catch (e) {
          console.warn('hljs load failed', e);
          return null;
        }
      })();
      return hljsPromise;
    }
    async function init(el) {
      const url = el.getAttribute('data-src');
      if (!url) return;
      const res = await fetch(url);
      const txt = await res.text();
      let out = txt;
      try { out = JSON.stringify(JSON.parse(txt), null, 2); } catch (e) {}
      const hljs = await loadHljs();
      if (hljs) {
        el.innerHTML = hljs.highlight(out, { language: 'json' }).value;
      } else {
        el.textContent = out;
      }
    }
    function scanRoot(root) {
      const els = root.matches?.('.json-code') ? [root] : root.querySelectorAll('.json-code');
      for (const el of els) {
        if (!el.hasAttribute('data-initialized')) {
          el.setAttribute('data-initialized', '1');
          init(el);
        }
      }
    }
    // htmx.onLoad fires only on newly loaded content, with the loaded element as arg
    htmx.onLoad(scanRoot);
    // initial scan for server-side pre-rendered content
    scanRoot(document.body);
  </script>
</body>
</html>
